# Install to /etc/nginx/sites-available/canvas-github-agent
# Serves the Vite build at / and proxies /api/ to uvicorn on 127.0.0.1:8010.
# Replace __APP_DIR__ with the app root (e.g. /opt/canvas-github-agent).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root __APP_DIR__/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
        return 301 /api/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
